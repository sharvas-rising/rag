services:
  - type: web
    name: lesson-query-api
    runtime: python-3.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        scope: run
      - key: SUPABASE_URL
        scope: run
      - key: SUPABASE_KEY
        scope: run
      - key: LANGFUSE_PUBLIC_KEY
        scope: run
      - key: LANGFUSE_SECRET_KEY
        scope: run
